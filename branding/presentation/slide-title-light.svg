<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#faf9f0"/>

  <!-- Ambient terra glow -->
  <ellipse cx="960" cy="540" rx="500" ry="350" fill="#d97757" opacity="0.03"/>

  <!-- Badger mark watermark, right -->
  <g transform="translate(1400, 250)" stroke="#131314" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.02">
    <line x1="0" y1="200" x2="50" y2="0"/>
    <line x1="65" y1="200" x2="115" y2="0"/>
    <line x1="130" y1="200" x2="180" y2="0"/>
  </g>

  <!-- S-curve logo mark -->
  <path d="M200 420 C140 420, 136 456, 170 500 C204 544, 200 580, 140 580"
    stroke="#d97757" stroke-width="10" stroke-linecap="round" fill="none"/>

  <!-- Wordmark -->
  <text x="240" y="520" fill="#131314" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="700" letter-spacing="0.01em">Salesteq</text>

  <!-- Tagline -->
  <text x="242" y="570" fill="#3d3d3f" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="500" letter-spacing="0.06em" opacity="0.45">AI COMMERCIAL OPERATIONS</text>

  <!-- Terra accent bar bottom -->
