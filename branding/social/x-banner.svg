<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <rect width="1500" height="500" fill="#131314"/>

  <!-- Massive terra gradient field — cinematic depth -->
  <ellipse cx="900" cy="250" rx="600" ry="350" fill="#d97757" opacity="0.07"/>
  <ellipse cx="850" cy="280" rx="300" ry="200" fill="#d97757" opacity="0.08"/>

  <!-- Network graph — nodes and connections representing intelligence -->
  <!-- Edges first (behind nodes) -->
  <g stroke="#d97757" stroke-width="1.5" fill="none" opacity="0.2">
    <line x1="180" y1="120" x2="420" y2="200"/>
    <line x1="420" y1="200" x2="650" y2="140"/>
    <line x1="650" y1="140" x2="900" y2="220"/>
    <line x1="900" y1="220" x2="1150" y2="160"/>
    <line x1="1150" y1="160" x2="1350" y2="240"/>
    <line x1="420" y1="200" x2="550" y2="350"/>
    <line x1="550" y1="350" x2="800" y2="380"/>
    <line x1="800" y1="380" x2="900" y2="220"/>
    <line x1="900" y1="220" x2="1050" y2="360"/>
    <line x1="1050" y1="360" x2="1350" y2="240"/>
    <line x1="180" y1="120" x2="300" y2="320"/>
    <line x1="300" y1="320" x2="550" y2="350"/>
    <line x1="1150" y1="160" x2="1200" y2="380"/>
    <line x1="1200" y1="380" x2="1050" y2="360"/>
    <line x1="650" y1="140" x2="550" y2="350"/>
    <line x1="800" y1="380" x2="1050" y2="360"/>
  </g>

  <!-- Secondary edges — wider web -->
  <g stroke="#faf9f0" stroke-width="0.8" fill="none" opacity="0.06">
    <line x1="80" y1="60" x2="180" y2="120"/>
    <line x1="80" y1="60" x2="200" y2="50"/>
    <line x1="200" y1="50" x2="420" y2="200"/>
    <line x1="1350" y1="240" x2="1440" y2="180"/>
    <line x1="1440" y1="180" x2="1420" y2="80"/>
    <line x1="300" y1="320" x2="200" y2="430"/>
    <line x1="200" y1="430" x2="400" y2="460"/>
    <line x1="400" y1="460" x2="550" y2="350"/>
    <line x1="1200" y1="380" x2="1350" y2="430"/>
    <line x1="1350" y1="430" x2="1420" y2="350"/>
    <line x1="1420" y1="350" x2="1350" y2="240"/>
  </g>

  <!-- Nodes — main constellation -->
  <!-- Large terra nodes (key entities) -->
  <circle cx="900" cy="220" r="8" fill="#d97757" opacity="0.9"/>
  <circle cx="650" cy="140" r="6" fill="#d97757" opacity="0.7"/>
  <circle cx="1150" cy="160" r="6" fill="#d97757" opacity="0.7"/>
  <circle cx="550" cy="350" r="5" fill="#d97757" opacity="0.6"/>
  <circle cx="1050" cy="360" r="5" fill="#d97757" opacity="0.6"/>

  <!-- Medium cream nodes -->
  <circle cx="420" cy="200" r="4.5" fill="#faf9f0" opacity="0.35"/>
  <circle cx="800" cy="380" r="4.5" fill="#faf9f0" opacity="0.3"/>
  <circle cx="1350" cy="240" r="4.5" fill="#faf9f0" opacity="0.3"/>
  <circle cx="180" cy="120" r="4" fill="#faf9f0" opacity="0.25"/>
  <circle cx="300" cy="320" r="4" fill="#faf9f0" opacity="0.25"/>
  <circle cx="1200" cy="380" r="3.5" fill="#faf9f0" opacity="0.2"/>

  <!-- Small outer nodes -->
  <circle cx="80" cy="60" r="2.5" fill="#faf9f0" opacity="0.12"/>
  <circle cx="200" cy="50" r="2" fill="#faf9f0" opacity="0.1"/>
  <circle cx="1440" cy="180" r="2.5" fill="#faf9f0" opacity="0.12"/>
  <circle cx="1420" cy="80" r="2" fill="#faf9f0" opacity="0.08"/>
  <circle cx="200" cy="430" r="2.5" fill="#faf9f0" opacity="0.1"/>
  <circle cx="400" cy="460" r="2" fill="#faf9f0" opacity="0.08"/>
  <circle cx="1350" cy="430" r="2" fill="#faf9f0" opacity="0.08"/>
  <circle cx="1420" cy="350" r="2.5" fill="#faf9f0" opacity="0.1"/>

  <!-- Glow rings on key terra nodes -->
  <circle cx="900" cy="220" r="20" fill="none" stroke="#d97757" stroke-width="1" opacity="0.15"/>
  <circle cx="900" cy="220" r="35" fill="none" stroke="#d97757" stroke-width="0.5" opacity="0.08"/>
  <circle cx="650" cy="140" r="15" fill="none" stroke="#d97757" stroke-width="0.8" opacity="0.1"/>
  <circle cx="1150" cy="160" r="15" fill="none" stroke="#d97757" stroke-width="0.8" opacity="0.1"/>

  <!-- Badger mark — three bold diagonal strokes, anchored to the central node -->
  <g transform="translate(860, 180)" stroke="#d97757" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.45">
    <line x1="0" y1="80" x2="20" y2="0"/>
    <line x1="25" y1="80" x2="45" y2="0"/>
    <line x1="50" y1="80" x2="70" y2="0"/>
  </g>

  <!-- Data pulse lines — horizontal, emanating from center -->
  <g stroke="#d97757" stroke-width="2" stroke-linecap="round" opacity="0.12">
    <line x1="940" y1="220" x2="1060" y2="220"/>
    <line x1="960" y1="232" x2="1030" y2="232"/>
    <line x1="950" y1="244" x2="1080" y2="244"/>
  </g>

  <!-- Text — right of center, bold -->
  <text x="580" y="478" fill="rgba(250,249,240,0.2)" font-family="JetBrains Mono, monospace" font-size="13" font-weight="500" letter-spacing="0.08em">AI COMMERCIAL OPERATIONS</text>

  <!-- Terra accent bar bottom -->
  <rect x="0" y="494" width="1500" height="6" fill="#d97757" opacity="0.4"/>
</svg>
