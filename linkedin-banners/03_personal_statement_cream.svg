<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <rect width="1584" height="396" fill="#faf9f0"/>

  <!-- Ambient glow -->
  <ellipse cx="792" cy="198" rx="500" ry="300" fill="#d97757" opacity="0.02"/>

  <!-- Badger watermark -->
  <g transform="translate(1280, 80)" opacity="0.02">
      <line x1="0" y1="225.0" x2="45.0" y2="0" stroke="#131314" stroke-width="6.0" stroke-linecap="round"/>
      <line x1="60.0" y1="225.0" x2="105.0" y2="0" stroke="#131314" stroke-width="6.0" stroke-linecap="round"/>
      <line x1="120.0" y1="225.0" x2="165.0" y2="0" stroke="#131314" stroke-width="6.0" stroke-linecap="round"/>
    </g>

  <!-- S-curve mark -->
  <path d="M100 148 C60 148, 57 178, 80 198 C103 218, 100 248, 60 248"
    stroke="#d97757" stroke-width="7" stroke-linecap="round" fill="none"/>

  <!-- Wordmark -->
  <text x="130" y="180" fill="#131314" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="700" letter-spacing="0.01em">Salesteq</text>

  <!-- Headline -->
  <text x="130" y="230" fill="#131314" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="800" letter-spacing="-0.02em">AI agents that run your</text>
  <text x="130" y="264" fill="#d97757" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="800" letter-spacing="-0.02em">revenue operations.</text>

  <!-- Terra accent bar -->
