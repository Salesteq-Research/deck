      <line x1="0" y1="270.0" x2="54.0" y2="0" stroke="#faf9f0" stroke-width="7.2" stroke-linecap="round"/>
      <line x1="72.0" y1="270.0" x2="126.0" y2="0" stroke="#faf9f0" stroke-width="7.2" stroke-linecap="round"/>
      <line x1="144.0" y1="270.0" x2="198.0" y2="0" stroke="#faf9f0" stroke-width="7.2" stroke-linecap="round"/>
    </g>

  <!-- S-curve mark -->
  <path d="M100 148 C60 148, 57 178, 80 198 C103 218, 100 248, 60 248"
