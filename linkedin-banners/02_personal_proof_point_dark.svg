<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <rect width="1584" height="396" fill="#131314"/>

  <!-- Ambient terra glow -->
  <ellipse cx="500" cy="198" rx="400" ry="280" fill="#d97757" opacity="0.025"/>

  <!-- Badger watermark -->
